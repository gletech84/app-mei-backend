<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard SaaS</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            width: 400px;
        }

        .ativo {
            color: #22c55e;
        }

        .inativo {
            color: #ef4444;
        }

        a {
            display: inline-block;
            margin-top: 10px;
            background: #3b82f6;
            padding: 10px;
            border-radius: 6px;
            color: white;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>Dashboard SaaS</h1>

    {% if user %}

        <p><strong>ID:</strong> {{ user[0] }}</p>
        <p><strong>Email:</strong> {{ user[1] }}</p>
        <p><strong>Plano:</strong> {{ user[3] }}</p>

        {% if user[4] == 1 %}
            <h2 class="ativo">Status: ATIVO 🟢</h2>
            <p>Acesso liberado ao sistema</p>
        {% else %}
            <h2 class="inativo">Status: INATIVO 🔴</h2>
            <p>Seu acesso está bloqueado</p>
            <a href="/checkout">Ativar com PIX</a>
        {% endif %}

    {% else %}
        <p>Usuário não encontrado</p>
    {% endif %}

</div>

</body>
</html>
